name: Daily VayboMeter (Cyprus)

on:
  schedule:
    # Утренний пост: ~08:30 на Кипре летом / ~07:30 зимой (UTC only)
    - cron: '30 5 * * *'
    # Вечерний пост: 14:00 UTC (≈17:00 на Кипре летом / 16:00 зимой)
    - cron: '0 14 * * *'
    # Курсы валют в полдень МСК: 09:00 UTC = 12:00 МСК
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      run_morning:
        description: "Запустить утренний пост"
        type: boolean
        default: false
        required: false
      run_evening:
        description: "Запустить вечерний пост"
        type: boolean
        default: true
        required: false
      run_noon_fx:
        description: "Запустить пост только с курсами"
        type: boolean
        default: false
        required: false
      format_v2:
        description: "FORMAT_V2 для ручного теста/override; расписание morning/evening уже включает V2"
        type: boolean
        default: false
        required: false
      work_date:
        description: "Переопределить дату (YYYY-MM-DD)"
        required: false
      to_test:
        description: "Публиковать в тестовый канал?"
        type: boolean
        default: false
        required: false
      channel_override:
        description: "Явный chat_id канала (перебивает параметры выше)"
        required: false

permissions:
  contents: read

concurrency:
  group: daily-post-cy
  cancel-in-progress: false

env:
  TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
  CHANNEL_ID:          ${{ secrets.CHANNEL_ID }}
  CHANNEL_ID_TEST:     ${{ secrets.CHANNEL_ID_TEST }}
  CHANNEL_ID_OVERRIDE: ${{ github.event.inputs.channel_override || '' }}

  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  GROQ_API_KEY:   ${{ secrets.GROQ_API_KEY }}

  GEN_SKIP_SHORT: "1"
  DISABLE_LLM_DAILY: "0"
  DISABLE_SCHUMANN: "1"
  FORMAT_V2: ${{ github.event.inputs.format_v2 == 'true' && '1' || '0' }}
  FORMAT_V2_MORNING_SPACING: "1"
  MORNING_FEELS_LIKE: "1"
  MORNING_BEST_WINDOW: "1"
  MORNING_SMART_PLAN: "1"
  MORNING_VAYBOMETER_SCORE: "1"
  EVENING_VAYBOMETER_SCORE: "1"
  FORMAT_V2_POLISH: "1"
  FORMAT_V2_SCORE_CONCLUSION: "1"
  FORMAT_V2_REASON_CONCLUSION: "1"
  FORMAT_V2_MAIN_NUANCE: "1"
  FORMAT_V2_ASTRO_CLEANUP: "1"
  FORMAT_V2_CONFIDENCE_POLISH: "1"

  TZ: Asia/Nicosia
  WORK_DATE: ${{ github.event.inputs.work_date || '' }}
  TO_TEST:   ${{ github.event.inputs.to_test || 'false' }}

  # Постоянная папка кэша (fx_cache.json / fx_inter_cache.json и др.)
  VAYBOMETER_CACHE_DIR: ".cache"

  # Утренние картинки: 5 стилей, авто-ротация по дате
  CY_IMG_ENABLED: "1"
  CY_MORNING_STYLE: "auto"          # можно: auto | 1 | 2 | 3 | 4 | 5
  CY_MORNING_SEED_OFFSET: "0"
  CY_MORNING_ASPECT: "1:1"

jobs:
  morning:
    name: Morning post (for today)
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '30 5 * * *') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.run_morning == 'true')
    steps:
      - uses: actions/checkout@v4

      - name: Restore .cache (FX + intermarket deltas)
        uses: actions/cache@v4
        with:
          path: .cache
          key: cy-cache-${{ runner.os }}-${{ github.workflow }}-${{ github.ref_name }}-${{ github.run_number }}
          restore-keys: |
            cy-cache-${{ runner.os }}-${{ github.workflow }}-${{ github.ref_name }}-

      - name: Time debug
        run: |
          echo "UTC:    $(date -u)"
          echo "Cyprus:  $(date)"
          echo "MSK:    $(TZ=Europe/Moscow date)"
          echo "FORMAT_V2: $FORMAT_V2"
          echo "event:   $GITHUB_EVENT_NAME"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "aiogram>=3,<4"

      - name: Post morning (for today)
        shell: bash
        run: |
          python <<'PY'
          import os, runpy, sys

          scheduled_run = (os.getenv("GITHUB_EVENT_NAME") == "schedule")
          format_v2 = scheduled_run or (os.getenv("FORMAT_V2", "").strip().lower() in ("1", "true", "yes", "on"))
          to_test = (os.getenv("TO_TEST", "").strip().lower() in ("1", "true", "yes", "on"))
          chat_override = (os.getenv("CHANNEL_ID_OVERRIDE") or "").strip()
          production_chat = (os.getenv("CHANNEL_ID") or "").strip()
          wd = (os.getenv("WORK_DATE") or "").strip()

          if format_v2:
              args = ["safe_test_post.py", "--mode", "morning", "--format-v2"]
              if wd:
                  args += ["--date", wd]
              if chat_override:
                  args += ["--chat-id", chat_override, "--send", "--no-test-label"]
              elif to_test:
                  args += ["--to-test", "--send"]
              elif scheduled_run and production_chat:
                  args += ["--chat-id", production_chat, "--send", "--no-test-label"]
              else:
                  print("FORMAT_V2 включён без to_test/channel_override: выполняю dry-run без отправки.")
              sys.argv = args
              runpy.run_path("safe_test_post.py", run_name="__main__")
              raise SystemExit(0)

          args = ["post_cy.py", "--mode", "morning"]
          if wd:
              args += ["--date", wd]
          if chat_override:
              args += ["--chat-id", chat_override]
          elif to_test:
              args.append("--to-test")
          sys.argv = args
          runpy.run_path("post_cy.py", run_name="__main__")
          PY

  evening:
    name: Evening post (for tomorrow)
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '0 14 * * *') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.run_evening == 'true')
    steps:
      - uses: actions/checkout@v4

      - name: Restore .cache (FX + intermarket deltas)
        uses: actions/cache@v4
        with:
          path: .cache
          key: cy-cache-${{ runner.os }}-${{ github.workflow }}-${{ github.ref_name }}-${{ github.run_number }}
          restore-keys: |
            cy-cache-${{ runner.os }}-${{ github.workflow }}-${{ github.ref_name }}-

      - name: Time debug
        run: |
          echo "UTC:    $(date -u)"
          echo "Cyprus:  $(date)"
          echo "MSK:    $(TZ=Europe/Moscow date)"
          echo "FORMAT_V2: $FORMAT_V2"
          echo "event:   $GITHUB_EVENT_NAME"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "aiogram>=3,<4"

      - name: Post evening (announce tomorrow)
        shell: bash
        run: |
          python <<'PY'
          import os, runpy, sys

          scheduled_run = (os.getenv("GITHUB_EVENT_NAME") == "schedule")
          format_v2 = scheduled_run or (os.getenv("FORMAT_V2", "").strip().lower() in ("1", "true", "yes", "on"))
          to_test = (os.getenv("TO_TEST","").strip().lower() in ("1","true","yes","on"))
          chat_override = (os.getenv("CHANNEL_ID_OVERRIDE") or "").strip()
          production_chat = (os.getenv("CHANNEL_ID") or "").strip()
          wd = (os.getenv("WORK_DATE") or "").strip()

          if format_v2:
              args = ["safe_test_post.py", "--mode", "evening", "--format-v2"]
              if wd:
                  args += ["--date", wd]
              if chat_override:
                  args += ["--chat-id", chat_override, "--send", "--no-test-label"]
              elif to_test:
                  args += ["--to-test", "--send"]
              elif scheduled_run and production_chat:
                  args += ["--chat-id", production_chat, "--send", "--no-test-label"]
              else:
                  print("FORMAT_V2 включён без to_test/channel_override: выполняю dry-run без отправки.")
              sys.argv = args
              runpy.run_path("safe_test_post.py", run_name="__main__")
              raise SystemExit(0)

          args = ["post_cy.py", "--mode", "evening"]

          if wd:
              args += ["--date", wd]

          if chat_override:
              args += ["--chat-id", chat_override]
          else:
              if to_test:
                  args.append("--to-test")

          sys.argv = args
          runpy.run_path("post_cy.py", run_name="__main__")
          PY

  noon_fx:
    name: Noon FX only (12:00 MSK)
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '0 9 * * *') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.run_noon_fx == 'true')
    steps:
      - uses: actions/checkout@v4

      - name: Restore .cache (FX + intermarket deltas)
        uses: actions/cache@v4
        with:
          path: .cache
          key: cy-cache-${{ runner.os }}-${{ github.workflow }}-${{ github.ref_name }}-${{ github.run_number }}
          restore-keys: |
            cy-cache-${{ runner.os }}-${{ github.workflow }}-${{ github.ref_name }}-

      - name: Time debug
        run: |
          echo "UTC:    $(date -u)"
          echo "Cyprus:  $(date)"
          echo "MSK:    $(TZ=Europe/Moscow date)"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "aiogram>=3,<4"

      - name: Post FX only (12:00 MSK)
        shell: bash
        run: |
          python <<'PY'
          import os, runpy, sys

          args = ["post_cy.py", "--fx-only"]

          wd = (os.getenv("WORK_DATE") or "").strip()
          if wd:
              args += ["--date", wd]

          chat_override = (os.getenv("CHANNEL_ID_OVERRIDE") or "").strip()
          if chat_override:
              args += ["--chat-id", chat_override]
          else:
              to_test = (os.getenv("TO_TEST","").strip().lower() in ("1","true","yes","on"))
              if to_test:
                  args.append("--to-test")

          sys.argv = args
          runpy.run_path("post_cy.py", run_name="__main__")
          PY
